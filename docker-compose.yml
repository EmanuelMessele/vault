services:
  postgres:
    image: pgvector/pgvector:pg15 # use the official postgres image from Docker Hub
    container_name: vault_postgres
    environment: # set environment variables for postgres
      POSTGRES_USER: vault_user
      POSTGRES_PASSWORD: vault_password
      POSTGRES_DB: vault_db
    ports: # punch a hole between machine and container
      - "5432:5432"
    volumes: # stores data outside the container
      - postgres_data:/var/lib/postgresql/data

  redis: # use the official redis image from Docker Hub
    image: redis:7
    container_name: vault_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: vault_backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: vault_db
      DB_USER: vault_user
      DB_PASSWORD: vault_password
      PORT: 5000
      CLIENT_URL: http://localhost:5173
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres
    volumes:
      - ./backend/uploads:/app/uploads

  ai-service:
    build: ./ai-service
    container_name: vault_ai_service
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://vault_user:vault_password@postgres:5432/vault_db
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - postgres
    volumes:
      - ./backend/uploads:/app/uploads

volumes:
  postgres_data:
