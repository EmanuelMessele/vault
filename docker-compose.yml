services:
  postgres:
    image: pgvector/pgvector:pg15 # use the official postgres image from Docker Hub
    container_name: vault_postgres
    environment: # set environment variables for postgres
      POSTGRES_USER: vault_user
      POSTGRES_PASSWORD: vault_password
      POSTGRES_DB: vault_db
    ports: # punch a hole between machine and container
      - "5432:5432"
    volumes: # stores data outside the container
      - postgres_data:/var/lib/postgresql/data

  redis: # use the official redis image from Docker Hub
    image: redis:7
    container_name: vault_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
